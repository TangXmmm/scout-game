<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SCOUT! 对局中</title>
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    /* ── 对局页专属布局 ──────────────────────────── */
    body {
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── 顶部状态条 ─────────────────────────────── */
    #header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      height: 44px;
      background: rgba(20,24,32,0.72);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .hb-left {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hb-left .hb-sep { color: rgba(255,255,255,0.2); }

    #action-log {
      flex: 1;
      text-align: center;
      font-size: clamp(0.72rem, 2.5vw, 0.8rem);
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #action-log .active-player {
      color: var(--accent-primary);
      font-weight: 700;
    }

    #header-right {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
      max-width: 30vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── PC 端主布局 ─────────────────────────────── */
    #game-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (min-width: 900px) {
      #game-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        grid-template-rows: auto 1fr auto auto;
        height: calc(100vh - 44px);
        height: calc(100dvh - 44px);
        overflow: hidden;
      }

      #players-sidebar {
        grid-row: 1 / -1;
        grid-column: 1;
        overflow-y: auto;
        border-right: 1px solid rgba(255,255,255,0.06);
        background: rgba(0,0,0,0.2);
        padding: 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      #players-top-bar { display: none; }
      #score-bar { display: none; }

      #stage-area {
        grid-column: 2;
        grid-row: 1 / 3;
        overflow-y: auto;
      }

      #action-area {
        grid-column: 2;
        grid-row: 3;
      }

      #my-hand-area {
        grid-column: 2;
        grid-row: 4;
        overflow-x: auto;
      }
    }

    @media (max-width: 899px) {
      #players-sidebar { display: none; }
    }

    /* ── PC 端玩家侧边栏 ─────────────────────────── */
    .sidebar-title {
      font-size: 0.65rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 0 4px;
      margin-bottom: 4px;
    }

    .sidebar-player {
      padding: 14px 14px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-default);
      transition: all 0.3s var(--ease-out);
    }

    .sidebar-player.active {
      border-color: var(--border-strong);
      background: rgba(214,168,75,0.06);
      animation: playerBreath 2.4s ease-in-out infinite;
    }

    @keyframes playerBreath {
      0%, 100% { box-shadow: 0 0 0 0 rgba(214,168,75,0); }
      50%       { box-shadow: 0 0 14px 0 rgba(214,168,75,0.2); }
    }

    .sp-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .sp-name {
      font-weight: 700;
      font-size: 0.92rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-player.active .sp-name { color: var(--accent-primary); }

    .sp-stats {
      display: flex;
      gap: 14px;
      font-size: 0.78rem;
    }

    .sp-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sp-stat-label {
      font-size: 0.62rem;
      color: var(--text-tertiary);
      letter-spacing: 0.3px;
    }

    .sp-stat-val {
      font-weight: 700;
      color: var(--text-primary);
    }

    .sp-stat-val.tok { color: var(--accent-primary); }
    .sp-stat-val.hand { color: var(--state-info); }

    .sp-status {
      font-size: 0.72rem;
      margin-top: 8px;
      padding: 2px 0;
    }

    /* ── 移动端顶部玩家条 ────────────────────────── */
    #players-top-bar {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      flex-shrink: 0;
    }

    #players-top-bar::-webkit-scrollbar { display: none; }

    .player-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-default);
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.25s;
      font-size: 0.8rem;
    }

    .player-chip.active {
      border-color: var(--border-strong);
      background: rgba(214,168,75,0.1);
      animation: chipBreath 2.4s ease-in-out infinite;
    }

    @keyframes chipBreath {
      0%, 100% { box-shadow: 0 0 0 0 rgba(214,168,75,0); }
      50%       { box-shadow: 0 0 10px 0 rgba(214,168,75,0.3); }
    }

    .player-chip.is-me { border-color: rgba(110,168,255,0.4); }
    .player-chip.active.is-me {
      border-color: var(--border-strong);
      background: rgba(214,168,75,0.12);
    }

    .chip-av {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-primary-hover));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.72rem; color: #1A1D24;
      flex-shrink: 0;
    }

    .chip-name { font-weight: 700; font-size: 0.82rem; }
    .chip-meta { color: var(--text-tertiary); font-size: 0.72rem; }
    .chip-live { color: var(--accent-primary); font-weight: 800; font-size: 0.82rem; }

    /* ── 移动端分数条 ────────────────────────────── */
    #score-bar {
      display: flex;
      gap: 5px;
      padding: 5px 12px;
      background: rgba(0,0,0,0.15);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }

    #score-bar::-webkit-scrollbar { display: none; }

    .sc-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-default);
      font-size: 0.65rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .sc-name { font-weight: 600; color: var(--text-secondary); }
    .sc-tok { color: var(--accent-primary); }
    .sc-hand { color: var(--state-info); }
    .sc-total { font-weight: 700; color: var(--state-success); }
    .sc-total.neg { color: var(--state-danger); }

    /* ── 中央视觉舞台 ────────────────────────────── */
    #stage-area {
      padding: 12px 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.03), rgba(255,255,255,0));
      min-height: 180px;
    }

    @media (min-width: 900px) {
      #stage-area {
        min-height: 220px;
        padding: 20px 28px;
      }
    }

    .stage-shell {
      width: 100%;
      max-width: 560px;
      min-height: 140px;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-xl);
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
      box-shadow: var(--shadow-card);
    }

    @media (min-width: 900px) {
      .stage-shell {
        min-height: 200px;
        padding: 20px 28px;
      }
    }

    .stage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .stage-label {
      font-size: 0.62rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #stage-meta {
      font-size: 0.72rem;
      color: var(--text-tertiary);
    }

    #stage-cards {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      min-height: 72px;
    }

    /* 在场组末端 badge */
    .stage-card-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .stage-end-badge {
      font-size: 0.52rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 6px;
    }

    .end-left {
      background: rgba(214,168,75,0.15);
      color: var(--accent-primary);
    }

    .end-right {
      background: rgba(110,168,255,0.15);
      color: var(--state-info);
    }

    /* 空场组时 */
    .stage-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 0;
      width: 100%;
    }

    .stage-empty-slot {
      width: 64px;
      height: 88px;
      border: 1.5px dashed rgba(255,255,255,0.12);
      border-radius: var(--radius-card);
      opacity: 0.5;
    }

    .stage-empty-main {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .stage-empty-sub {
      font-size: 0.78rem;
      color: var(--text-tertiary);
    }

    /* 在场组底部行为提示 */
    #stage-hint {
      font-size: 0.75rem;
      color: var(--text-tertiary);
      text-align: center;
      padding: 4px 8px;
      border-radius: 8px;
      line-height: 1.5;
    }

    #stage-hint.hint-emphasis {
      background: rgba(214,168,75,0.08);
      color: var(--text-secondary);
      border: 1px solid rgba(214,168,75,0.12);
    }

    /* ── 操作按钮区 ──────────────────────────────── */
    #action-area {
      padding: 8px 12px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.12);
      border-top: 1px solid rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }

    /* ── 手牌区 ──────────────────────────────────── */
    #my-hand-area {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
      background: rgba(0,0,0,0.2);
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .hand-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .hand-label {
      font-size: 0.68rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    #hand-count-badge {
      padding: 1px 8px;
      border-radius: var(--radius-pill);
      background: rgba(110,168,255,0.12);
      border: 1px solid rgba(110,168,255,0.2);
      color: var(--state-info);
      font-size: 0.65rem;
      font-weight: 600;
    }

    #my-hand-cards {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      padding-bottom: 10px;
      align-items: flex-end;
      min-height: calc(var(--card-h) + 24px);
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
      -webkit-overflow-scrolling: touch;
    }

    #my-hand-cards::-webkit-scrollbar { height: 3px; }
    #my-hand-cards::-webkit-scrollbar-track { background: transparent; }
    #my-hand-cards::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    /* ── 翻牌弹窗专属 ────────────────────────────── */
    #flip-modal { z-index: 150; }

    .flip-modal-sections {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .flip-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    .flip-desc em {
      color: var(--text-primary);
      font-style: normal;
      font-weight: 600;
    }

    .flip-preview-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
    }

    .flip-preview-label {
      font-size: 0.68rem;
      color: var(--text-tertiary);
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .flip-hand-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
    }

    .flip-decision-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .flip-decision-btn {
      height: 52px;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all var(--dur-normal) var(--ease-out);
      touch-action: manipulation;
    }

    .flip-btn-confirm {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-primary-hover));
      color: #1A1D24;
      box-shadow: var(--shadow-button);
    }

    .flip-btn-confirm:hover {
      box-shadow: 0 8px 24px rgba(214,168,75,0.3);
      transform: translateY(-1px);
    }

    .flip-btn-keep {
      background: rgba(255,255,255,0.04);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
    }

    .flip-btn-keep:hover {
      background: rgba(255,255,255,0.08);
    }

    .flip-status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-top: 12px;
      border-top: 1px solid var(--border-default);
    }

    .flip-stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.04);
      color: var(--text-tertiary);
      border: 1px solid var(--border-default);
    }

    .flip-stat-chip.done {
      background: rgba(81,179,127,0.12);
      color: var(--state-success);
      border-color: rgba(81,179,127,0.25);
    }

    /* ── Scout 挖角弹窗 ──────────────────────────── */
    #scout-modal { z-index: 220; }

    .scout-desc { font-size: 0.84rem; color: var(--text-secondary); line-height: 1.6; }

    .pos-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pos-btn {
      padding: 12px 8px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-default);
      background: rgba(255,255,255,0.03);
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .pos-btn.selected {
      border-color: var(--border-strong);
      background: rgba(214,168,75,0.1);
      color: var(--accent-primary);
    }

    .scouted-preview {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-bottom: 14px;
    }

    .scouted-preview-label {
      font-size: 0.78rem;
      color: var(--accent-primary);
      margin-bottom: 6px;
    }

    .flip-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: var(--text-tertiary);
      cursor: pointer;
      margin-top: 6px;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid var(--border-default);
      background: rgba(255,255,255,0.02);
      touch-action: manipulation;
    }

    .flip-toggle input { accent-color: var(--accent-primary); width: 14px; height: 14px; cursor: pointer; }

    .insert-section { margin-bottom: 14px; }
    .insert-section-title { font-size: 0.78rem; color: var(--text-tertiary); margin-bottom: 8px; }

    #insert-preview-row {
      display: flex;
      gap: 3px;
      align-items: center;
      overflow-x: auto;
      padding: 8px;
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
      border: 1px solid var(--border-default);
      min-height: 56px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    #insert-preview-row::-webkit-scrollbar { display: none; }

    .mini-card {
      width: 26px; height: 36px;
      border-radius: 4px;
      background: #fff;
      color: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 900;
      flex-shrink: 0;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.12s;
    }

    .mini-card:hover { border-color: rgba(214,168,75,0.5); transform: translateY(-2px); }

    .mini-insert-line {
      width: 2.5px; height: 36px;
      background: var(--accent-primary);
      border-radius: 2px;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(214,168,75,0.6);
    }

    .mini-slot {
      width: 10px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .mini-slot::after {
      content: '';
      display: block;
      width: 2px;
      height: 24px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
    }

    .mini-slot:hover::after { background: rgba(214,168,75,0.4); }

    .mini-scouted {
      width: 26px; height: 36px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 900;
      flex-shrink: 0;
      border: 1.5px solid var(--accent-primary);
      box-shadow: 0 0 8px rgba(214,168,75,0.4);
      animation: popIn 0.25s var(--ease-spring);
    }

    @keyframes popIn {
      from { transform: scale(0.4) translateY(-8px); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .insert-hint-text { font-size: 0.7rem; color: var(--accent-primary); text-align: center; margin-top: 6px; }

    #scout-and-show-hint {
      display: none;
      margin-bottom: 10px;
      padding: 8px 12px;
      background: rgba(110,168,255,0.08);
      border: 1px solid rgba(110,168,255,0.15);
      border-radius: 8px;
      font-size: 0.78rem;
      color: var(--state-info);
    }

    /* ── 回合结束/游戏结束弹窗 ───────────────────── */
    #round-end-modal { z-index: 300; }
    #game-end-modal  { z-index: 320; }

    .winner-line {
      font-size: clamp(0.9rem, 3vw, 1.1rem);
      color: var(--accent-primary);
      font-weight: 700;
      margin-bottom: 16px;
    }

    .scores-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 14px;
      font-size: clamp(0.72rem, 2.5vw, 0.84rem);
    }

    .scores-table th {
      color: var(--text-tertiary);
      font-size: 0.66rem;
      padding: 4px 6px;
      text-align: left;
      border-bottom: 1px solid var(--border-default);
    }

    .scores-table td { padding: 7px 6px; border-top: 1px solid rgba(255,255,255,0.04); }
    .scores-table tr.winner td { color: var(--accent-primary); font-weight: 700; }

    .score-rule-hint {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .game-end-emoji { font-size: 2.5rem; margin-bottom: 8px; }
    .game-winner-name { font-size: clamp(1.1rem, 4vw, 1.5rem); font-weight: 900; color: var(--accent-primary); }
    .game-winner-sub { color: var(--text-tertiary); margin-bottom: 16px; font-size: 0.85rem; }

    /* ── 聊天浮层系统 ─────────────────────────────── */
    .chat-bubble-container {
      position: fixed;
      right: 20px;
      top: 60px;
      bottom: 0;
      width: 260px;
      pointer-events: none;
      z-index: 50;
    }

    .chat-messages {
      position: absolute;
      right: 0;
      top: 10px;
      width: 100%;
      max-height: 300px;
      overflow: hidden;
      pointer-events: none;
    }

    .chat-message {
      background: rgba(15,19,27,0.88);
      color: var(--text-primary);
      padding: 7px 12px;
      border-radius: 18px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      animation: msgSlideIn 0.3s var(--ease-out), msgFadeOut 0.5s 4.5s forwards;
      pointer-events: auto;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .chat-message .sender {
      font-weight: 700;
      color: var(--accent-primary);
      margin-right: 5px;
    }

    @keyframes msgSlideIn {
      from { transform: translateX(60px); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }

    @keyframes msgFadeOut { to { opacity: 0; } }

    /* 玩家头像旁的气泡 */
    .player-bubble {
      position: absolute;
      background: rgba(32,39,53,0.96);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      padding: 5px 10px;
      font-size: 0.75rem;
      color: var(--text-primary);
      white-space: nowrap;
      box-shadow: var(--shadow-card);
      animation: bubbleIn 0.15s var(--ease-spring);
      z-index: 60;
      pointer-events: none;
    }

    @keyframes bubbleIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* 聊天悬浮按钮 */
    .chat-toolbar {
      position: fixed;
      right: 18px;
      bottom: max(18px, env(safe-area-inset-bottom, 18px));
      pointer-events: auto;
      z-index: 101;
    }

    .btn-toggle-chat {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(32,39,53,0.9);
      border: 1px solid var(--border-default);
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .btn-toggle-chat:hover { transform: scale(1.08); }
    .btn-toggle-chat.has-new { animation: chatPulse 2s ease-in-out 3; }

    @keyframes chatPulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
      50%       { box-shadow: 0 4px 16px rgba(214,168,75,0.4); }
    }

    /* 聊天展开面板 */
    .chat-input-panel {
      position: fixed;
      right: 18px;
      bottom: max(72px, calc(62px + env(safe-area-inset-bottom, 0px)));
      width: 360px;
      max-width: calc(100vw - 36px);
      background: var(--bg-overlay);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-popup);
      padding: 14px;
      pointer-events: auto;
      max-height: 460px;
      overflow-y: auto;
      z-index: 102;
      animation: panelUp 0.18s var(--ease-out);
    }

    @keyframes panelUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    /* 快捷语区 */
    .quick-phrases-section { margin-bottom: 12px; }

    .quick-phrases-label {
      font-size: 0.65rem;
      color: var(--text-tertiary);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .quick-phrases-main {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .qp-btn {
      height: 44px;
      padding: 0 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-pill);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease-out);
      touch-action: manipulation;
    }

    .qp-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
    }

    .qp-btn:active { transform: scale(0.92); }

    /* 更多快捷语折叠区 */
    .quick-more {
      display: none;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 7px;
    }

    .quick-more.expanded { display: flex; }

    .qp-more-toggle {
      height: 36px;
      padding: 0 12px;
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.12);
      border-radius: var(--radius-pill);
      color: var(--text-tertiary);
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all var(--dur-fast);
      margin-top: 4px;
    }

    .qp-more-toggle:hover { border-color: rgba(255,255,255,0.2); color: var(--text-secondary); }

    /* emoji 区 */
    .emoji-section { margin-bottom: 12px; }

    .emoji-label {
      font-size: 0.65rem;
      color: var(--text-tertiary);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      max-height: 90px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .emoji-btn {
      padding: 7px;
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s;
      touch-action: manipulation;
    }

    .emoji-btn:hover { background: rgba(255,255,255,0.1); }
    .emoji-btn:active { transform: scale(1.2); }

    /* 输入区 */
    .chat-input-row {
      display: flex;
      gap: 7px;
      align-items: stretch;
    }

    .chat-text-input {
      flex: 1;
      height: 48px;
      padding: 0 14px;
      background: #2B3345;
      border: 1px solid #3A4358;
      border-radius: 12px;
      color: var(--text-primary);
      font-size: max(16px, 0.9rem);
      font-family: inherit;
      outline: none;
      transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
    }

    .chat-text-input::placeholder { color: #7E879B; }
    .chat-text-input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(214,168,75,0.1);
    }

    .chat-send-btn {
      height: 48px;
      padding: 0 14px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-primary-hover));
      border: none;
      border-radius: 12px;
      color: #1A1D24;
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--dur-normal);
      touch-action: manipulation;
      white-space: nowrap;
    }

    .chat-send-btn:hover {
      box-shadow: 0 4px 12px rgba(214,168,75,0.3);
      transform: translateY(-1px);
    }

    .chat-collapse-btn {
      height: 48px;
      padding: 0 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      color: var(--text-tertiary);
      font-family: inherit;
      font-size: 0.84rem;
      cursor: pointer;
      transition: all var(--dur-normal);
      touch-action: manipulation;
      white-space: nowrap;
    }

    .chat-collapse-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-secondary); }

    /* 移动端适配 */
    @media (max-width: 900px) {
      .chat-bubble-container { width: calc(100vw - 40px); }
      .chat-messages { width: 100%; }
      .chat-input-panel { right: 18px; width: calc(100vw - 36px); }
    }
  </style>
</head>
<body>

  <!-- ── 顶部状态条 ─────────────────────────────────────────────── -->
  <div id="header-bar">
    <div class="hb-left">
      <span>第 <span id="round-num">1</span> 局</span>
      <span class="hb-sep">·</span>
      <span>第 <span id="turn-num">1</span> 轮</span>
    </div>
    <span id="action-log">游戏加载中…</span>
    <span id="header-right"></span>
  </div>

  <!-- ── 对局主布局 ─────────────────────────────────────────────── -->
  <div id="game-layout">

    <!-- PC 端左侧玩家栏 -->
    <div id="players-sidebar">
      <div class="sidebar-title">玩家</div>
      <!-- JS 填充 -->
    </div>

    <!-- 移动端顶部玩家条 -->
    <div id="players-top-bar"><!-- JS 填充 --></div>

    <!-- 移动端分数条 -->
    <div id="score-bar"><!-- JS 填充 --></div>

    <!-- 中央视觉舞台 -->
    <div id="stage-area">
      <div class="stage-shell">
        <div class="stage-header">
          <span class="stage-label">当前场组</span>
          <span id="stage-meta"></span>
        </div>
        <div id="stage-cards">
          <div class="stage-empty" id="stage-empty-view">
            <div style="display:flex;gap:6px;">
              <div class="stage-empty-slot"></div>
              <div class="stage-empty-slot" style="opacity:0.3;"></div>
            </div>
            <div class="stage-empty-main" id="stage-empty-who">本轮先手出牌</div>
            <div class="stage-empty-sub">请选择连续牌进行演出</div>
          </div>
        </div>
        <div id="stage-hint"></div>
      </div>
    </div>

    <!-- 操作按钮区 -->
    <div id="action-area">
      <button class="act-btn" id="btn-show" onclick="doShow()" disabled>演出</button>
      <button class="act-btn" id="btn-scout" onclick="openScoutModal(false)" disabled>挖角</button>
      <button class="act-btn" id="btn-scout-show" onclick="openScoutModal(true)" disabled>挖角并演出</button>
    </div>

    <!-- 我的手牌 -->
    <div id="my-hand-area">
      <div class="hand-header">
        <span class="hand-label">我的手牌</span>
        <span id="hand-count-badge"></span>
      </div>
      <div id="my-hand-cards"></div>
    </div>

  </div><!-- /#game-layout -->

  <!-- ══════════════════════════════════════════════════════════
       翻牌弹窗（Task 5）
  ═══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="flip-modal">
    <div class="modal-box" style="max-width:560px;">
      <div class="modal-title">是否翻转手牌</div>

      <div class="flip-modal-sections">
        <!-- 说明区 -->
        <div class="flip-desc">
          翻转后，手牌将<em>上下互换并倒序排列</em>，该顺序将在本局内保持不变。<br/>
          <span style="color:var(--text-tertiary);font-size:0.8rem;">建议选择更容易组成连续组的一面。</span>
        </div>

        <!-- 预览区 -->
        <div class="flip-preview-box">
          <div class="flip-preview-label">当前显示：翻转后预览</div>
          <div class="flip-hand-preview" id="flip-preview"></div>
        </div>

        <!-- 决策区 -->
        <div class="flip-decision-row">
          <button class="flip-decision-btn flip-btn-confirm" onclick="doFlip()">确认翻转</button>
          <button class="flip-decision-btn flip-btn-keep" onclick="doConfirmFlip()">保持当前顺序</button>
        </div>

        <!-- 玩家确认状态 -->
        <div class="flip-status-row" id="flip-status-row"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       Scout 挖角弹窗
  ═══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="scout-modal">
    <div class="modal-box">
      <div class="modal-title" id="scout-modal-title">挖角</div>
      <p class="scout-desc" id="scout-modal-desc">从在场组两端取1张牌，插入手牌任意位置。</p>

      <!-- ① 选端 -->
      <div style="font-size:0.75rem;color:var(--text-tertiary);margin-bottom:8px;">① 选择取哪一端（只取1张）：</div>
      <div class="pos-btns">
        <button class="pos-btn" id="pos-left" onclick="selectPos('left')">
          <div style="font-size:0.65rem;opacity:0.7;margin-bottom:4px;">← 左端</div>
          <div id="preview-left"></div>
          <div id="flip-left-wrap" style="display:none;margin-top:4px;">
            <label class="flip-toggle" onclick="event.stopPropagation()">
              <input type="checkbox" id="flip-left-cb" onchange="onFlipChange()" />
              <label for="flip-left-cb" style="font-size:0.72rem;color:var(--text-tertiary);">翻转此牌</label>
            </label>
          </div>
        </button>
        <button class="pos-btn" id="pos-right" onclick="selectPos('right')">
          <div style="font-size:0.65rem;opacity:0.7;margin-bottom:4px;">右端 →</div>
          <div id="preview-right"></div>
          <div id="flip-right-wrap" style="display:none;margin-top:4px;">
            <label class="flip-toggle" onclick="event.stopPropagation()">
              <input type="checkbox" id="flip-right-cb" onchange="onFlipChange()" />
              <label for="flip-right-cb" style="font-size:0.72rem;color:var(--text-tertiary);">翻转此牌</label>
            </label>
          </div>
        </button>
      </div>

      <!-- 挖到的牌预览 -->
      <div class="scouted-preview" id="scouted-preview">
        <div class="scouted-preview-label">你将挖到这张牌：</div>
        <div id="scouted-card-show"></div>
      </div>

      <!-- ② 插入位置 -->
      <div class="insert-section">
        <div class="insert-section-title">② 点击位置线选择插入位置：</div>
        <div id="insert-preview-row"></div>
        <div class="insert-hint-text" id="insert-hint"></div>
      </div>

      <div id="scout-and-show-hint">
        挖角后，请在手牌中选择要演出的连续牌
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary btn-sm" id="scout-confirm-btn" onclick="confirmScout()">确认挖角</button>
        <button class="btn btn-secondary btn-sm" onclick="closeScoutModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       回合结束弹窗
  ═══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="round-end-modal">
    <div class="modal-box" style="text-align:center;">
      <div style="font-size:1.4rem;margin-bottom:6px;">🎉 回合结束！</div>
      <div class="winner-line" id="round-winner-text"></div>
      <table class="scores-table">
        <thead>
          <tr>
            <th>玩家</th>
            <th>计分过程</th>
            <th>本轮</th>
            <th>累计</th>
          </tr>
        </thead>
        <tbody id="round-scores-body"></tbody>
      </table>
      <div class="score-rule-hint">
        赢家：Token 分（不扣手牌）；其他：Token − 剩余手牌数
      </div>
      <button class="btn btn-primary btn-sm" id="btn-next-round" onclick="nextRound()" style="margin:0 auto;">下一轮</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       游戏结束弹窗
  ═══════════════════════════════════════════════════════════ -->
  <div class="modal-overlay" id="game-end-modal">
    <div class="modal-box" style="text-align:center;">
      <div class="game-end-emoji">🏆</div>
      <div class="game-winner-name" id="game-winner-name"></div>
      <div class="game-winner-sub">赢得了本局游戏！</div>
      <table class="scores-table" style="margin-bottom:16px;">
        <thead><tr><th>名次</th><th>玩家</th><th>总分</th></tr></thead>
        <tbody id="game-scores-body"></tbody>
      </table>
      <button class="btn btn-secondary btn-sm" onclick="backToLobby()" style="margin:0 auto;">返回大厅</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- ══════════════════════════════════════════════════════════
       聊天浮层系统（Task 6）
  ═══════════════════════════════════════════════════════════ -->
  <!-- 气泡弹幕区 -->
  <div class="chat-bubble-container">
    <div id="chat-messages" class="chat-messages"></div>
  </div>

  <!-- 悬浮聊天按钮 -->
  <div class="chat-toolbar">
    <button class="btn-toggle-chat" id="chat-toggle-btn" onclick="toggleChatInput()">💬</button>
  </div>

  <!-- 展开的聊天面板 -->
  <div id="chat-input-panel" class="chat-input-panel" style="display:none;">
    <!-- 快捷语区 -->
    <div class="quick-phrases-section">
      <div class="quick-phrases-label">快捷语</div>
      <div class="quick-phrases-main">
        <button class="qp-btn" onclick="sendQuick('gg')">GG</button>
        <button class="qp-btn" onclick="sendQuick('nice')">漂亮</button>
        <button class="qp-btn" onclick="sendQuick('oops')">哎呀</button>
        <button class="qp-btn" onclick="sendQuick('hurry')">快点啦</button>
        <button class="qp-btn" onclick="sendQuick('sorry')">抱歉</button>
        <button class="qp-btn" onclick="sendQuick('comeOn')">加油</button>
      </div>
      <!-- 更多快捷语 -->
      <div class="quick-more" id="quick-more">
        <button class="qp-btn" onclick="sendQuick('think')">让我想想</button>
        <button class="qp-btn" onclick="sendQuick('wow')">哇</button>
        <button class="qp-btn" onclick="sendQuick('lucky')">运气真好</button>
        <button class="qp-btn" onclick="sendQuick('unlucky')">太背了</button>
      </div>
      <button class="qp-more-toggle" id="qp-more-btn" onclick="toggleMorePhrases()">+ 更多</button>
    </div>

    <!-- Emoji 区（6×2，滚动） -->
    <div class="emoji-section">
      <div class="emoji-label">表情</div>
      <div class="emoji-grid" id="emoji-list">
        <!-- JS 生成 -->
      </div>
    </div>

    <!-- 输入区 -->
    <div class="chat-input-row">
      <input class="chat-text-input" id="chat-input"
             type="text" placeholder="输入消息…" maxlength="50"
             onkeypress="if(event.key==='Enter') sendTextMessage()" />
      <button class="chat-send-btn" onclick="sendTextMessage()">发送</button>
      <button class="chat-collapse-btn" onclick="toggleChatInput()">收起</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/game.js"></script>
</body>
</html>
